run:
  timeout: 5m
  tests: false
  go: "1.19"

issues:
  exclude-dirs:
    - .go/
    - .agents/
    - .claude/
    - opensrc/
    - web/
  exclude-files:
    - ".*pb.go"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - bodyclose
    - goconst
    - gofmt
    - goimports
    - gosec
    - misspell
    - prealloc
    - unconvert

linters-settings:
  govet:
    check-unreachable: true
    check-rangeloops: true
    check-copylocks: true
  gosec:
    excludes:
      - G115  # integer overflow conversion — safe in business context
