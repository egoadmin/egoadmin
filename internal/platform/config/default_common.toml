# EgoAdmin 公共默认配置。
# 该文件只包含跨服务通用且不绑定具体业务数据库/Redis 实例的默认项。
# 环境变量覆盖格式：EGOADMIN_<EnvSuffix>，EnvSuffix 由 TOML path 直接大写拼接。
# 例如 component.idgen.codec.secret 对应 EGOADMIN_COMPONENT_IDGEN_CODEC_SECRET。

[component.idgen.default]
# 本地 ID 生成器命名空间。业务服务通过远端 idgen 服务领取号段；多环境必须区分。
# EnvSuffix: COMPONENT_IDGEN_DEFAULT_NAMESPACE
namespace = "egoadmin"
# 本地 ID 生成器实例名，对应远端 idgen 服务中的号段名。
# EnvSuffix: COMPONENT_IDGEN_DEFAULT_NAME
name = "default"

[component.idgen.machine]
# 机器号租约分组。默认通过远端 idgen 服务分配、续租和释放租约。
# EnvSuffix: COMPONENT_IDGEN_MACHINE_GROUP
group = "egoadmin"
# 机器租约 TTL，默认至少保留 5 次续期窗口。
# EnvSuffix: COMPONENT_IDGEN_MACHINE_TTL
ttl = "60s"
# 机器租约续期间隔。
# EnvSuffix: COMPONENT_IDGEN_MACHINE_RENEWINTERVAL
renewInterval = "10s"
# 单次续期/重新申请 RPC 超时，应明显短于续期间隔。
# EnvSuffix: COMPONENT_IDGEN_MACHINE_RENEWTIMEOUT
renewTimeout = "5s"
# 成功续期后至少保留多少次后续续期机会。
# EnvSuffix: COMPONENT_IDGEN_MACHINE_MINRENEWWINDOWS
minRenewWindows = 5
# 重新申请机器号失败后的退避时间。
# EnvSuffix: COMPONENT_IDGEN_MACHINE_REALLOCATEBACKOFF
reallocateBackoff = "2s"

[cron.idgen.machine.renew]
# 机器租约续期任务。任务内部会处理短暂失败、租约丢失与重新申请。
# EnvSuffix: CRON_IDGEN_MACHINE_RENEW_DELAYEXECTYPE
delayExecType = "skip"
# 机器租约是进程级租约，不能使用分布式锁合并多实例任务。
# EnvSuffix: CRON_IDGEN_MACHINE_RENEW_ENABLEDISTRIBUTEDTASK
enableDistributedTask = false
# 启动时已同步申请租约，不需要立即执行续期。
# EnvSuffix: CRON_IDGEN_MACHINE_RENEW_ENABLEIMMEDIATELYRUN
enableImmediatelyRun = false
# 使用秒级 cron 表达式。
# EnvSuffix: CRON_IDGEN_MACHINE_RENEW_ENABLESECONDS
enableSeconds = true
# 与 component.idgen.machine.renewInterval 保持一致。
# EnvSuffix: CRON_IDGEN_MACHINE_RENEW_SPEC
spec = "0/10 * * * * ?"

[component.idgen.codec]
# 可逆公开 ID 编码密钥，生产环境必须通过环境变量覆盖。
# EnvSuffix: COMPONENT_IDGEN_CODEC_SECRET
secret = ""
# 编码算法名称。除非升级 idcodec 实现，否则保持默认。
# EnvSuffix: COMPONENT_IDGEN_CODEC_ALGORITHM
algorithm = "feistel-base62"
# 输出字符集。
# EnvSuffix: COMPONENT_IDGEN_CODEC_ALPHABET
alphabet = "base62"
# 编码后的最短长度。
# EnvSuffix: COMPONENT_IDGEN_CODEC_MINLENGTH
minLength = 12
# 分段显示分隔符。
# EnvSuffix: COMPONENT_IDGEN_CODEC_SEPARATOR
separator = "-"
# 是否暴露 idcodec 指标。
# EnvSuffix: COMPONENT_IDGEN_CODEC_ENABLEMETRICS
enableMetrics = true

[etcd]
# etcd 地址列表，服务注册与发现使用；逗号分隔环境变量值。
# EnvSuffix: ETCD_ADDRS
addrs = ["127.0.0.1:2379"]
# etcd 建连超时。
# EnvSuffix: ETCD_CONNECTTIMEOUT
connectTimeout = "1s"

[registry]
# 服务注册发现后端。默认使用本地 Docker Compose etcd。
# EnvSuffix: REGISTRY_SCHEME
scheme = "etcd"
# 服务注册发现 key 前缀。
# EnvSuffix: REGISTRY_PREFIX
prefix = "egoadmin"
# 服务注册租约时间。
# EnvSuffix: REGISTRY_SERVICETTL
serviceTTL = "10s"
