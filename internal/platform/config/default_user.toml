# user 服务默认配置。
# user 负责身份、会话、角色、Casbin、内部鉴权和用户域定时任务。
# 环境变量覆盖格式：EGOADMIN_<EnvSuffix>。
# 例如 app.user.jwtSignKey 对应 EGOADMIN_APP_USER_JWTSIGNKEY。

[app.service]
# 是否启用 GORM 自动迁移。默认使用 Atlas，不建议打开。
# EnvSuffix: APP_SERVICE_AUTOMIGRATE
autoMigrate = false
# 服务显示/注册相关名称。
# EnvSuffix: APP_SERVICE_NAME
name = "egoadmin-user"
# 平台展示名称。
# EnvSuffix: APP_SERVICE_PLATFORMNAME
platformName = "核心管理平台"
# user 不直接校验前端权限契约，gateway 负责聚合校验。
# EnvSuffix: APP_SERVICE_SKIPPERMISSIONCONTRACTCHECK
skipPermissionContractCheck = true
# 默认对象存储桶。
# EnvSuffix: APP_SERVICE_BUCKETNAME
bucketName = "egoadmin"

[app.shutdown]
# graceful stop 总超时。需小于等于容器 terminationGracePeriodSeconds。
# EnvSuffix: APP_SHUTDOWN_STOPTIMEOUT
stopTimeout = "20s"
# 收到停止信号后先将 /readyz 置为不可用，再等待摘流。
# EnvSuffix: APP_SHUTDOWN_DRAINTIMEOUT
drainTimeout = "2s"
# Redis、DB、registry 等非 server 资源单项关闭超时。
# EnvSuffix: APP_SHUTDOWN_CLOSETIMEOUT
closeTimeout = "5s"

[app.dbMigration]
# 是否在进程启动时执行 Atlas migration。
# EnvSuffix: APP_DBMIGRATION_ENABLED
enabled = true
# 迁移驱动，目前仅支持 atlas。
# EnvSuffix: APP_DBMIGRATION_DRIVER
driver = "atlas"
# Atlas 迁移数据库 URL，生产环境必须通过环境变量覆盖。
# EnvSuffix: APP_DBMIGRATION_URL
url = "mysql://egoadmin:change-me@127.0.0.1:3307/egoadmin_user?charset=utf8mb4&parseTime=True&loc=Local"
# user 服务迁移目录。
# EnvSuffix: APP_DBMIGRATION_DIR
dir = "file://atlas/migrations/user"
# Atlas 可执行文件路径。
# EnvSuffix: APP_DBMIGRATION_BIN
bin = "atlas"

[app.user]
# root 初始密码。生产环境必须通过环境变量或初始化流程设置。
# EnvSuffix: APP_USER_ROOTPASSWORD
rootPassword = ""
# admin 初始密码。生产环境必须通过环境变量或初始化流程设置。
# EnvSuffix: APP_USER_ADMINPASSWORD
adminPassword = ""
# JWT 签名密钥，生产环境必须通过环境变量覆盖。
# EnvSuffix: APP_USER_JWTSIGNKEY
jwtSignKey = ""
# access token 过期秒数。
# EnvSuffix: APP_USER_JWTEXPIRE
jwtExpire = 604800
# refresh token 过期秒数。
# EnvSuffix: APP_USER_REFRESHTOKENEXPIRE
refreshTokenExpire = 2592000
# 是否启用验证码。
# EnvSuffix: APP_USER_USECAPTCHA
useCaptcha = false
# 是否允许多端登录。
# EnvSuffix: APP_USER_MULTILOGINENABLED
multiLoginEnabled = true
# 单用户最大登录客户端数量。
# EnvSuffix: APP_USER_MAXLOGINCLIENT
maxLoginClient = 2
# 是否启用心跳超时离线标记。关闭后定时任务不再根据 heartbeat_time 改在线状态。
# EnvSuffix: APP_USER_HEARTBEATOFFLINEENABLED
heartbeatOfflineEnabled = true
# 心跳超时离线秒数。默认 11 分钟，需大于前端 heartbeat 间隔和浏览器后台节流窗口。
# EnvSuffix: APP_USER_HEARTBEATOFFLINESECONDS
heartbeatOfflineSeconds = 660
# 心跳超时离线时是否撤销登录 session。默认 false，仅影响在线列表，不踢登录态。
# EnvSuffix: APP_USER_REVOKESESSIONONHEARTBEATOFFLINE
revokeSessionOnHeartbeatOffline = false

[server.http]
# user HTTP 监听地址。仅注册无鉴权 /healthz 与 /readyz。
# EnvSuffix: SERVER_HTTP_HOST
host = "0.0.0.0"
# user HTTP 监听端口。
# EnvSuffix: SERVER_HTTP_PORT
port = 9101
# Gin 运行模式。
# EnvSuffix: SERVER_HTTP_MODE
mode = "release"
# 是否记录请求访问日志。
# EnvSuffix: SERVER_HTTP_ENABLEACCESSINTERCEPTORREQ
enableAccessInterceptorReq = false
# 是否记录响应访问日志。
# EnvSuffix: SERVER_HTTP_ENABLEACCESSINTERCEPTORRES
enableAccessInterceptorRes = false
# 是否启用 HTTP 指标。
# EnvSuffix: SERVER_HTTP_ENABLEMETRICINTERCEPTOR
enableMetricInterceptor = false
# 是否启用 HTTP tracing。health-only HTTP server 不需要 HTTP 中间件链。
# EnvSuffix: SERVER_HTTP_ENABLETRACEINTERCEPTOR
enableTraceInterceptor = false
# 是否启用 CORS。health-only HTTP server 不需要 CORS 中间件。
# EnvSuffix: SERVER_HTTP_ENABLECORS
enableCors = false

[server.grpc]
# gRPC 服务注册名称，用于 etcd 服务发现。
# EnvSuffix: SERVER_GRPC_NAME
name = "egoadmin-user"
# user gRPC 监听地址。
# EnvSuffix: SERVER_GRPC_HOST
host = "127.0.0.1"
# user gRPC 监听端口。
# EnvSuffix: SERVER_GRPC_PORT
port = 9102

[server.governor]
# user governor 监听地址。
# EnvSuffix: SERVER_GOVERNOR_HOST
host = "0.0.0.0"
# user governor 监听端口。
# EnvSuffix: SERVER_GOVERNOR_PORT
port = 9103

[trace]
# OpenTelemetry 服务名，默认开发环境写入本地 Jaeger。
# EnvSuffix: TRACE_SERVICENAME
ServiceName = "egoadmin-user"
# trace exporter 类型，默认使用 Jaeger all-in-one 支持的 OTLP gRPC。
# EnvSuffix: TRACE_OTELTYPE
OtelType = "otlp"
# trace 采样率。开发默认全采样，生产可通过环境变量降低。
# EnvSuffix: TRACE_FRACTION
Fraction = 1.00

[trace.otlp]
# OTLP gRPC endpoint，dev-up 默认启动本地 Jaeger 并暴露 4317。
# EnvSuffix: TRACE_OTLP_ENDPOINT
Endpoint = "127.0.0.1:4317"

[client.mysql]
# 是否输出 SQL debug 日志。
# EnvSuffix: CLIENT_MYSQL_DEBUG
debug = true
# user 数据库 DSN，生产环境必须通过环境变量覆盖。
# EnvSuffix: CLIENT_MYSQL_DSN
dsn = "egoadmin:change-me@tcp(127.0.0.1:3307)/egoadmin_user?charset=utf8mb4&parseTime=True&loc=Local&readTimeout=1s&timeout=1s&writeTimeout=3s"

[client.redis]
# user Redis 地址。
# EnvSuffix: CLIENT_REDIS_ADDR
addr = "127.0.0.1:6380"
# 是否输出 Redis debug 日志。
# EnvSuffix: CLIENT_REDIS_DEBUG
debug = true
# Redis 组件模式。
# EnvSuffix: CLIENT_REDIS_MODE
mode = "stub"
# Redis 密码，生产环境通过环境变量覆盖。
# EnvSuffix: CLIENT_REDIS_PASSWORD
password = ""

[client.jetcache]
# 缓存组件名。
# EnvSuffix: CLIENT_JETCACHE_NAME
name = "default"
# 远端缓存过期时间。
# EnvSuffix: CLIENT_JETCACHE_REMOTEEXPIRY
remoteExpiry = "1h0m0s"
# 本地缓存最大条目数。
# EnvSuffix: CLIENT_JETCACHE_LOCALSIZE
localSize = 256
# 本地缓存过期时间。
# EnvSuffix: CLIENT_JETCACHE_LOCALEXPIRY
localExpiry = "1m0s"
# 后台刷新间隔。
# EnvSuffix: CLIENT_JETCACHE_REFRESHDURATION
refreshDuration = "2m0s"
# 停止后台刷新的最大空闲时间。
# EnvSuffix: CLIENT_JETCACHE_STOPREFRESHAFTER
stopRefreshAfter = "1h0m0s"
# 空值缓存过期时间。
# EnvSuffix: CLIENT_JETCACHE_NOTFOUNDEXPIRY
notFoundExpiry = "1m0s"
# 是否暴露缓存指标。
# EnvSuffix: CLIENT_JETCACHE_ENABLEMETRICS
enableMetrics = true
# 是否启用本地缓存同步。
# EnvSuffix: CLIENT_JETCACHE_ENABLESYNCLOCAL
enableSyncLocal = false
# 缓存序列化格式。
# EnvSuffix: CLIENT_JETCACHE_CODEC
codec = "msgpack"

[component.logincrypto]
# 登录加密 challenge 有效期。
# EnvSuffix: COMPONENT_LOGINCRYPTO_CHALLENGETTL
challengeTTL = "3m0s"
# 客户端时间戳允许偏差。
# EnvSuffix: COMPONENT_LOGINCRYPTO_TIMESTAMPSKEW
timestampSkew = "2m0s"
# RSA 密钥位数。
# EnvSuffix: COMPONENT_LOGINCRYPTO_RSAKEYBITS
rsaKeyBits = 4096
# 是否暴露登录加密指标。
# EnvSuffix: COMPONENT_LOGINCRYPTO_ENABLEMETRICS
enableMetrics = true

[client.grpc.idgen]
# idgen 服务 gRPC 地址。默认通过 etcd 服务发现。
# EnvSuffix: CLIENT_GRPC_IDGEN_ADDR
addr = "etcd:///egoadmin-idgen"
# idgen gRPC 读超时。
# EnvSuffix: CLIENT_GRPC_IDGEN_READTIMEOUT
readTimeout = "3s"
# idgen gRPC 建连超时。
# EnvSuffix: CLIENT_GRPC_IDGEN_DIALTIMEOUT
dialTimeout = "5s"

[client.asyncq]
# asyncq 使用的 Redis 地址。
# EnvSuffix: CLIENT_ASYNCQ_REDISADDR
redisAddr = "127.0.0.1:6380"
# asyncq Redis 密码。
# EnvSuffix: CLIENT_ASYNCQ_REDISPASSWORD
redisPassword = ""
# asyncq Redis DB。
# EnvSuffix: CLIENT_ASYNCQ_REDISDB
redisDB = 0
# 是否启用 asyncq client。
# EnvSuffix: CLIENT_ASYNCQ_ENABLECLIENT
enableClient = true
# 是否启用 asyncq server。
# EnvSuffix: CLIENT_ASYNCQ_ENABLESERVER
enableServer = false
# asyncq 并发数。
# EnvSuffix: CLIENT_ASYNCQ_CONCURRENCY
concurrency = 10
# asyncq 队列权重。inline table 的 key 分别覆盖，例如 CLIENT_ASYNCQ_QUEUES_CRITICAL。
queues = { critical = 6, default = 3, low = 1 }
# 最大重试次数。
# EnvSuffix: CLIENT_ASYNCQ_MAXRETRY
maxRetry = 3
# 重试策略。
# EnvSuffix: CLIENT_ASYNCQ_RETRYDELAYFUNC
retryDelayFunc = "exponential"
# 单任务超时。
# EnvSuffix: CLIENT_ASYNCQ_TASKTIMEOUT
taskTimeout = "30s"
# 是否记录 asyncq 访问日志。
# EnvSuffix: CLIENT_ASYNCQ_ENABLEACCESSLOG
enableAccessLog = false
# asyncq 慢日志阈值。
# EnvSuffix: CLIENT_ASYNCQ_SLOWLOGTHRESHOLD
slowLogThreshold = "1s"
# 是否启用 asyncq 健康检查。
# EnvSuffix: CLIENT_ASYNCQ_ENABLEHEALTHCHECK
enableHealthCheck = false

[client.minio]
# MinIO/S3 endpoint。
# EnvSuffix: CLIENT_MINIO_ENDPOINT
endpoint = "127.0.0.1:9000"
# MinIO/S3 Access Key，生产环境通过环境变量覆盖。
# EnvSuffix: CLIENT_MINIO_ACCESSKEYID
accessKeyID = ""
# MinIO/S3 Secret Key，生产环境通过环境变量覆盖。
# EnvSuffix: CLIENT_MINIO_SECRETACCESSKEY
secretAccessKey = ""
# 是否使用 HTTPS。
# EnvSuffix: CLIENT_MINIO_SSL
ssl = false

[cron.user.login.offline]
# 分布式任务延迟执行策略。
# EnvSuffix: CRON_USER_LOGIN_OFFLINE_DELAYEXECTYPE
delayExecType = "skip"
# 是否启用分布式任务锁。
# EnvSuffix: CRON_USER_LOGIN_OFFLINE_ENABLEDISTRIBUTEDTASK
enableDistributedTask = false
# 启动后是否立即执行一次。
# EnvSuffix: CRON_USER_LOGIN_OFFLINE_ENABLEIMMEDIATELYRUN
enableImmediatelyRun = true
# Cron 表达式是否包含秒。
# EnvSuffix: CRON_USER_LOGIN_OFFLINE_ENABLESECONDS
enableSeconds = true
# 离线登录态清理 Cron 表达式。
# EnvSuffix: CRON_USER_LOGIN_OFFLINE_SPEC
spec = "0 0/1 * * * ?"
