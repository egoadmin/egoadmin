when:
  - event: [push, tag, pull_request]

clone:
  git:
    image: woodpeckerci/plugin-git:2.0.3
    settings:
      partial: false
      depth: 50

pipeline:
  restore-cache:
    image: drillster/drone-volume-cache
    privileged: true
    volumes:
      - /home/egoadmin/drone/cache/node:/cache
    settings:
      restore: true
      mount:
        - ./node_modules
    when:
      - event: [push, tag]

  build:
    image: node:18
    depends_on:
      - restore-cache
    commands:
      - npm install -g pnpm
      - pnpm install --registry=https://registry.npm.taobao.org
      - pnpm run build
      - tar -cvf dist.tar dist && mv dist src/buildfile/docker
    when:
      - event: [push, tag]

  rebuild-cache:
    image: drillster/drone-volume-cache
    privileged: true
    depends_on:
      - build
    volumes:
      - /home/egoadmin/drone/cache/node:/cache
    settings:
      rebuild: true
      mount:
        - ./node_modules
    when:
      - event: [push, tag]

  build-docker:
    image: plugins/docker
    depends_on:
      - build
    settings:
      context: src/buildfile/docker
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags: ${CI_COMMIT_TAG}
      repo: egoadmin/egoadmin-web
      dockerfile: src/buildfile/docker/Dockerfile
    when:
      - event: [push, tag]

  deploy-dev:
    image: appleboy/drone-ssh
    depends_on:
      - build-docker
    settings:
      host:
        from_secret: kube-ssh-host
      username:
        from_secret: kube-ssh-user
      password:
        from_secret: kube-ssh-pass
      port:
        from_secret: kube-ssh-port
      script:
        from_secret: ks_script
    when:
      - event: [push, tag]
