<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>在线用户 · 核心管理平台</title>
<style>
/* EgoAdmin 后台 · 在线用户 — 令牌取自 DESIGN.md（亮/暗双主题） */
:root{
  --bg:#FAFBFC; --surface:#FFFFFF; --surface-2:#F4F6F8; --surface-3:#EAEDF1;
  --fg:#14181F; --text:#3A4250; --muted:#6B7280; --faint:#9AA3B2; --border:#E6E8EC; --border-strong:#D5D9E0;
  --accent:#1573E6; --accent-hover:#1267CC; --accent-press:#0F58B0; --accent-weak:#E8F1FC; --accent-text:#1166C4;
  --cyan:#19B6DD; --cyan-weak:#E2F6FC; --success:#17B26A; --success-weak:#E6F7EF; --warning:#F5A623; --warning-weak:#FDF3E2; --danger:#E5484D; --danger-weak:#FCEBEC;
  --font-display:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
  --font-mono:"JetBrains Mono","SF Mono","Cascadia Code",ui-monospace,Menlo,Consolas,monospace;
  --r-sm:6px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-pill:999px;
  --shadow-sm:0 2px 6px rgb(16 24 40 / .06); --shadow-md:0 6px 18px -6px rgb(16 24 40 / .12); --shadow-lg:0 16px 40px -12px rgb(16 24 40 / .18);
  --focus:0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent); --ease:cubic-bezier(.2,0,0,1); --ease-out:cubic-bezier(.16,1,.3,1);
}
.dark{
  --bg:#0E1116; --surface:#161B22; --surface-2:#1C232D; --surface-3:#232B36; --fg:#E6EAF0; --text:#C2C9D4; --muted:#8B95A4; --faint:#6A7382; --border:#262C36; --border-strong:#38414E;
  --accent:#4B9CF5; --accent-hover:#62A9F7; --accent-press:#3C8AE6; --accent-weak:#17304E; --accent-text:#6FB0F7; --cyan:#43C6E8; --cyan-weak:#16323C; --success-weak:#10261C; --danger-weak:#2C1517;
  --shadow-md:0 6px 18px -6px rgb(0 0 0 / .5); --shadow-lg:0 16px 40px -12px rgb(0 0 0 / .6);
}
*{box-sizing:border-box} html,body{margin:0; height:100%}
body{background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:14px; -webkit-font-smoothing:antialiased; transition:background .3s var(--ease), color .3s var(--ease)}
h1,h2,h3{font-family:var(--font-display); color:var(--fg); margin:0}
.mono{font-family:var(--font-mono)} .num{font-variant-numeric:tabular-nums}

.topnav{position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:30px; height:60px; padding:0 24px; background:var(--surface); border-bottom:1px solid var(--border)}
.topnav .brand{display:flex; align-items:center; gap:9px; font-family:var(--font-display); font-weight:680; color:var(--fg); font-size:15.5px}
.topnav .menu{display:flex; gap:26px; align-self:stretch}
.topnav .menu a{position:relative; display:inline-flex; align-items:center; font-size:14px; font-weight:500; color:var(--text); text-decoration:none; padding:0 2px; cursor:pointer; transition:color .18s var(--ease)}
.topnav .menu a::after{content:""; position:absolute; left:0; right:0; bottom:0; height:2px; background:transparent; border-radius:2px 2px 0 0; transition:background .18s var(--ease)}
.topnav .menu a:hover{color:var(--fg)}
.topnav .menu a.on{color:var(--fg); font-weight:600} .topnav .menu a.on::after{background:var(--accent)}
.topnav .rt{margin-left:auto; display:flex; align-items:center; gap:8px}
.icon-btn{width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:var(--r-md); color:var(--muted); cursor:pointer; border:0; background:none; transition:.15s var(--ease)}
.icon-btn:hover{background:var(--surface-2); color:var(--fg)}
.lang{font-size:12.5px; color:var(--muted); padding:0 8px; cursor:pointer}
.avatar{display:flex; align-items:center; gap:8px; padding:5px 8px 5px 6px; border-radius:var(--r-pill); cursor:pointer; text-decoration:none} .avatar:hover{background:var(--surface-2)}
.avatar .pic{width:28px; height:28px; border-radius:50%; background:var(--accent-weak); color:var(--accent-text); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600}
.avatar .nm{font-size:13.5px; color:var(--text)}
.grp{position:relative; display:flex; align-items:center}
.grp .grp-btn{position:relative; display:inline-flex; align-items:center; gap:5px; height:100%; font:inherit; font-size:14px; font-weight:500; color:var(--text); background:none; border:0; padding:0 2px; cursor:pointer; transition:color .18s var(--ease)}
.grp .grp-btn .cv{color:var(--faint); transition:transform .18s var(--ease)}
.grp:hover .grp-btn{color:var(--fg)} .grp:hover .grp-btn .cv{transform:rotate(180deg)}
.grp .grp-btn::after{content:""; position:absolute; left:0; right:13px; bottom:0; height:2px; background:transparent; border-radius:2px 2px 0 0; transition:background .18s var(--ease)}
.grp .grp-btn.on{color:var(--fg); font-weight:600} .grp .grp-btn.on::after{background:var(--accent)}
.topnav .menu .grp-drop{position:absolute; top:100%; left:-8px; min-width:152px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); box-shadow:var(--shadow-md); padding:6px; display:flex; flex-direction:column; opacity:0; visibility:hidden; transform:translateY(4px); transition:opacity .16s var(--ease), transform .16s var(--ease); z-index:60}
.grp:hover .grp-drop{opacity:1; visibility:visible; transform:translateY(0)}
.topnav .menu .grp-drop a{display:block; height:auto; font-size:13.5px; font-weight:500; color:var(--text); text-decoration:none; padding:8px 12px; border-radius:var(--r-sm); white-space:nowrap; transition:.12s var(--ease)}
.topnav .menu .grp-drop a::after{display:none}
.topnav .menu .grp-drop a:hover{background:var(--surface-2); color:var(--fg)}
.topnav .menu .grp-drop a.cur{color:var(--accent-text); background:var(--accent-weak); font-weight:550}

.page{max-width:1440px; margin:0 auto; padding:24px}
.pagemain{background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px 24px}
.pm-head{display:flex; align-items:center; gap:16px; margin-bottom:18px; flex-wrap:wrap}
.pm-head h1{font-size:26px; font-weight:620; letter-spacing:-.012em}
.batchbar{display:flex; align-items:center; gap:14px; margin-left:8px; font-size:13.5px; color:var(--muted)}
.batchbar b{color:var(--accent-text)}
.pm-head .tools{margin-left:auto; display:flex; align-items:center; gap:10px}
.search{position:relative}
.search svg{position:absolute; left:11px; top:9px; color:var(--faint)}
.search input{height:36px; width:200px; font:inherit; font-size:14px; color:var(--fg); background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--r-md); padding:0 12px 0 34px}
.search input:focus{outline:none; border-color:var(--accent); box-shadow:var(--focus)}
.btn{font:inherit; font-size:14px; font-weight:550; cursor:pointer; border-radius:var(--r-md); padding:8px 14px; border:1px solid transparent; display:inline-flex; align-items:center; gap:7px; transition:.18s var(--ease)}
.btn:focus-visible{outline:none; box-shadow:var(--focus)}
.btn-secondary{background:var(--surface); color:var(--text); border-color:var(--border-strong)} .btn-secondary:hover{border-color:var(--accent); color:var(--accent-text)}
.btn-primary{background:var(--accent); color:#fff} .btn-primary:hover{background:var(--accent-hover)}
.btn-danger{background:var(--danger); color:#fff} .btn-danger:hover{filter:brightness(.94)}
.btn-link{background:none; border:0; color:var(--accent-text); cursor:pointer; font:inherit; font-size:13.5px}
.btn-warn{background:var(--surface); color:var(--danger); border-color:var(--border-strong)} .btn-warn:hover{border-color:var(--danger); background:var(--danger-weak)}
.filter-wrap{position:relative}
.filter-btn.act{border-color:var(--accent); color:var(--accent-text)}
.popover{position:absolute; right:0; top:44px; width:280px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); box-shadow:var(--shadow-lg); padding:16px; z-index:60; display:none}
.popover.open{display:block}
.popover label{display:block; font-size:13px; color:var(--text); margin:0 0 7px; font-weight:500}
.popover input{width:100%; height:34px; font:inherit; font-size:13px; color:var(--fg); background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--r-md); padding:0 10px}
.popover input:focus{outline:none; border-color:var(--accent); box-shadow:var(--focus)}
.popover .pf{display:flex; justify-content:flex-end; gap:8px; margin-top:16px}
.btn-ghost{background:none;color:var(--muted);border-color:transparent} .btn-ghost:hover{background:var(--surface-2);color:var(--fg)}

.tbl{width:100%; border-collapse:collapse; font-size:14px}
.tbl th{text-align:left; font-size:13px; font-weight:600; color:var(--text); background:var(--surface-2); padding:13px 16px; border-bottom:1px solid var(--border); white-space:nowrap}
.tbl th:first-child{border-top-left-radius:var(--r-md)} .tbl th:last-child{border-top-right-radius:var(--r-md)}
.tbl td{padding:0 16px; height:56px; color:var(--text); border-bottom:1px solid var(--border); vertical-align:middle}
.tbl tbody tr{position:relative; transition:background .15s var(--ease)} .tbl tbody tr:hover{background:var(--accent-weak)}
.tbl .uname{font-family:var(--font-mono); color:var(--fg)}
.sortable{cursor:pointer; user-select:none; display:inline-flex; align-items:center; gap:5px}
.sortable .ar{color:var(--faint); font-size:10px; line-height:1}
.sortable.asc .ar,.sortable.desc .ar{color:var(--accent)}
.cbx{width:16px; height:16px; cursor:pointer; accent-color:var(--accent)}
.tbl .acts{position:absolute; right:16px; top:0; height:100%; display:flex; align-items:center; opacity:0; transition:opacity .15s var(--ease); padding-left:24px; background:linear-gradient(90deg,transparent,var(--accent-weak) 16%)}
.tbl tbody tr:hover .acts{opacity:1}
.acts a{font-size:13px; color:var(--danger); cursor:pointer; display:inline-flex; align-items:center; gap:5px}
.empty{text-align:center; padding:52px 0; color:var(--muted); display:flex; flex-direction:column; align-items:center}
.empty .ei{width:60px; height:60px; border-radius:50%; background:var(--surface-2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--faint); margin-bottom:14px}
.empty h4{font-size:15px; font-weight:600; color:var(--fg); margin:0}
.empty p{font-size:13px; color:var(--muted); margin:5px 0 0}
.empty .ea{margin-top:16px}
.sk-body .sk-row{display:flex; align-items:center; gap:18px; padding:0 16px; height:56px; border-bottom:1px solid var(--border)}
.sk{position:relative; overflow:hidden; background:var(--surface-2); border-radius:6px; height:12px}
.sk::after{content:""; position:absolute; inset:0; transform:translateX(-100%); background:linear-gradient(90deg,transparent,color-mix(in oklab,var(--surface) 75%,transparent),transparent); animation:shimmer 1.3s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}
@media (prefers-reduced-motion:reduce){.sk::after{animation:none}}
.pager{display:flex; align-items:center; justify-content:flex-end; gap:16px; margin-top:18px; color:var(--muted); font-size:13px}
.pager b{color:var(--fg)} .pager .pg{display:flex; gap:6px}
.pager .pg span{min-width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center; border-radius:var(--r-sm); border:1px solid var(--border); font-size:13px}
.pager .pg span.on{background:var(--accent); color:#fff; border-color:var(--accent)}

.backdrop{position:fixed; inset:0; background:rgb(16 24 40 / .45); display:flex; opacity:0; visibility:hidden; transition:.2s var(--ease); z-index:100}
.backdrop.open{opacity:1; visibility:visible}
.confirm{margin:auto; width:380px; max-width:calc(100vw - 32px); background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); box-shadow:var(--shadow-lg); padding:24px; text-align:center; transform:translateY(8px); transition:transform .2s var(--ease-out)}
.backdrop.open .confirm{transform:none}
.confirm .ic{width:44px; height:44px; border-radius:50%; background:var(--warning-weak); color:var(--warning); display:flex; align-items:center; justify-content:center; margin:0 auto 14px}
.confirm h3{font-size:17px; margin-bottom:8px} .confirm p{color:var(--muted); font-size:13.5px; margin:0 0 22px} .confirm .row2{display:flex; gap:10px} .confirm .row2 .btn{flex:1; justify-content:center}
.toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--fg); color:var(--bg); font-size:13.5px; padding:11px 18px; border-radius:var(--r-pill); box-shadow:var(--shadow-lg); opacity:0; pointer-events:none; transition:.24s var(--ease-out); z-index:200}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
@media (max-width:760px){ .topnav .menu{display:none} .page{padding:16px} }
@media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>

<nav class="topnav" data-od-id="topnav">
  <div class="brand"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.6"><path d="M12 2v20M2 12h20M5 5l14 14M19 5L5 19" stroke-linecap="round"/></svg>核心管理平台</div>
  <div class="menu">
    <div class="grp"><button type="button" class="grp-btn on">系统设置 <svg class="cv" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="grp-drop"><a href="role.html">角色管理</a><a href="online_user.html" class="cur">在线用户</a><a href="operation_log.html">操作日志</a></div></div>
    <div class="grp"><button type="button" class="grp-btn">用户管理 <svg class="cv" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="grp-drop"><a href="user.html">用户管理</a><a href="organization.html">组织管理</a></div></div>
  </div>
  <div class="rt">
    <button class="icon-btn" title="搜索"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg></button>
    <button class="icon-btn" id="themeBtn" title="切换主题"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3a9 9 0 1 0 9 9c-5 0-9-4-9-9z"/></svg></button>
    <span class="lang">中 / EN</span>
    <a class="avatar" href="personal.html"><span class="pic">A</span><span class="nm">admin</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M6 9l6 6 6-6" stroke-linecap="round"/></svg></a>
  </div>
</nav>

<div class="page">
  <section class="pagemain" data-od-id="online-list">
    <div class="pm-head">
      <h1>在线用户</h1>
      <div class="batchbar" id="batchbar" style="display:none">
        <span>已选 <b id="selCount">0</b> 项</span>
        <button class="btn-link" id="clearSel">取消</button>
        <button class="btn btn-warn" id="batchKick"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 17l5-5-5-5M21 12H9M9 5H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h4" stroke-linecap="round" stroke-linejoin="round"/></svg>强制退出</button>
      </div>
      <div class="tools">
        <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg><input id="kw" placeholder="搜索用户名"></div>
        <div class="filter-wrap">
          <button class="btn btn-secondary filter-btn" id="filterBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5h18l-7 8v6l-4 2v-8z" stroke-linejoin="round"/></svg>筛选</button>
          <div class="popover" id="pop">
            <label>登录 IP</label>
            <input id="fIp" placeholder="输入登录 IP">
            <div class="pf"><button class="btn btn-ghost" id="fReset">重置</button><button class="btn btn-primary" id="fApply">确定</button></div>
          </div>
        </div>
      </div>
    </div>
    <table class="tbl">
      <thead><tr>
        <th style="width:48px"><input type="checkbox" class="cbx" id="selAll"></th>
        <th>用户名</th><th>登录 IP</th>
        <th><span class="sortable desc" id="sortTime">登录时间 <span class="ar">▼</span></span></th>
        <th style="width:120px"></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="pager"><span>共 <b class="num" id="total">0</b> 条</span><span>每页 10 条</span><div class="pg"><span>‹</span><span class="on">1</span><span>›</span></div></div>
  </section>
</div>

<div class="backdrop" id="confirm">
  <div class="confirm" role="alertdialog" aria-modal="true">
    <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 17l5-5-5-5M21 12H9M9 5H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h3>强制退出</h3><p id="confirmText">确定强制退出该用户的当前会话吗？</p>
    <div class="row2"><button class="btn btn-secondary" data-close>取消</button><button class="btn btn-danger" id="confirmYes">强制退出</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let sessions=[
  {id:1,u:"admin",ip:"10.21.6.18",time:"2026-06-27 10:28:51"},
  {id:2,u:"lina",ip:"10.21.6.51",time:"2026-06-27 09:01:18"},
  {id:3,u:"chenh",ip:"10.21.6.32",time:"2026-06-26 22:14:05"},
  {id:4,u:"zhaoq",ip:"10.21.6.77",time:"2026-06-26 20:46:33"},
  {id:5,u:"demo",ip:"203.0.113.45",time:"2026-06-26 15:09:50"}
];
let sortDir="desc", checked=new Set(), pendingKick=null;
const rowsEl=document.getElementById('rows'),totalEl=document.getElementById('total'),kw=document.getElementById('kw'),selAll=document.getElementById('selAll');
const batchbar=document.getElementById('batchbar'),selCount=document.getElementById('selCount');
let fIpVal="";
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function visible(){
  const q=kw.value.trim();
  let list=sessions.filter(s=>(!q||s.u.includes(q))&&(!fIpVal||s.ip.includes(fIpVal)));
  list.sort((a,b)=>sortDir==='asc'?a.time.localeCompare(b.time):b.time.localeCompare(a.time));
  return list;
}
let loadT;
function skeletonHTML(){
  const bar=w=>`<div class="sk" style="width:${w}"></div>`;
  const ws=[['18%','22%','24%'],['16%','20%','22%'],['20%','24%','20%'],['14%','22%','26%'],['18%','20%','22%']];
  return `<tr><td colspan="5" style="padding:0;border:0"><div class="sk-body">`+ws.map(r=>`<div class="sk-row">${bar(r[0])}${bar(r[1])}<div style="margin-left:auto">${bar(r[2])}</div></div>`).join('')+`</div></td></tr>`;
}
function emptyRow(){
  const filtering=kw.value.trim()||fIpVal;
  if(filtering) return `<tr><td colspan="5"><div class="empty"><div class="ei"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg></div><h4>没有匹配的会话</h4><p>试试调整用户名或登录 IP 筛选。</p><button class="btn btn-secondary ea" data-empty="reset">清空筛选</button></div></td></tr>`;
  return `<tr><td colspan="5"><div class="empty"><div class="ei"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6" stroke-linecap="round"/></svg></div><h4>当前没有在线会话</h4><p>暂时没有用户在线。</p></div></td></tr>`;
}
function load(){ rowsEl.innerHTML=skeletonHTML(); selAll.checked=false; clearTimeout(loadT); loadT=setTimeout(()=>render(),600); }
function render(){
  const list=visible(); totalEl.textContent=list.length;
  if(!list.length){ rowsEl.innerHTML=emptyRow(); }
  else { rowsEl.innerHTML=list.map(s=>`<tr data-id="${s.id}">
    <td><input type="checkbox" class="cbx rowck" ${checked.has(s.id)?'checked':''}></td>
    <td class="uname">${esc(s.u)}</td>
    <td class="mono num">${esc(s.ip)}</td>
    <td class="mono num">${esc(s.time)}</td>
    <td><div class="acts"><a data-act="kick"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 17l5-5-5-5M21 12H9M9 5H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h4" stroke-linecap="round" stroke-linejoin="round"/></svg>强制退出</a></div></td>
  </tr>`).join(''); }
  const ids=list.map(s=>s.id);
  selAll.checked=ids.length>0&&ids.every(id=>checked.has(id));
  syncBatch();
}
function syncBatch(){ const n=checked.size; selCount.textContent=n; batchbar.style.display=n?'flex':'none'; }
kw.addEventListener('input',render);
document.getElementById('sortTime').addEventListener('click',function(){ sortDir=sortDir==='asc'?'desc':'asc'; this.classList.toggle('asc',sortDir==='asc'); this.classList.toggle('desc',sortDir==='desc'); this.querySelector('.ar').textContent=sortDir==='asc'?'▲':'▼'; render(); });
selAll.addEventListener('change',()=>{ visible().forEach(s=>selAll.checked?checked.add(s.id):checked.delete(s.id)); render(); });
rowsEl.addEventListener('change',e=>{ if(e.target.classList.contains('rowck')){ const id=+e.target.closest('tr').dataset.id; e.target.checked?checked.add(id):checked.delete(id); selAll.checked=visible().every(s=>checked.has(s.id)); syncBatch(); } });
rowsEl.addEventListener('click',e=>{ const a=e.target.closest('[data-act]'); if(!a)return; const id=+a.closest('tr').dataset.id; openKick([id]); });
document.getElementById('clearSel').addEventListener('click',()=>{ checked.clear(); render(); });
rowsEl.addEventListener('click',e=>{ const em=e.target.closest('[data-empty]'); if(!em)return; kw.value=''; fIpVal=''; document.getElementById('fIp').value=''; filterBtn.classList.remove('act'); render(); });
document.getElementById('batchKick').addEventListener('click',()=>openKick([...checked]));

function openKick(ids){ pendingKick=ids; document.getElementById('confirmText').innerHTML=ids.length>1?`确定强制退出选中的 <b>${ids.length}</b> 个用户会话吗？`:`确定强制退出「<b>${esc(sessions.find(s=>s.id===ids[0]).u)}</b>」的当前会话吗？`; document.getElementById('confirm').classList.add('open'); }
document.getElementById('confirmYes').addEventListener('click',()=>{ if(!pendingKick)return; const n=pendingKick.length; sessions=sessions.filter(s=>!pendingKick.includes(s.id)); pendingKick.forEach(id=>checked.delete(id)); pendingKick=null; document.getElementById('confirm').classList.remove('open'); render(); toast(`已强制退出 ${n} 个会话`); });
document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',e=>e.target.closest('.backdrop').classList.remove('open')));
document.getElementById('confirm').addEventListener('click',e=>{if(e.target.id==='confirm')e.currentTarget.classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.backdrop.open').forEach(b=>b.classList.remove('open'));});

const pop=document.getElementById('pop'),filterBtn=document.getElementById('filterBtn');
filterBtn.addEventListener('click',e=>{e.stopPropagation(); pop.classList.toggle('open');});
document.addEventListener('click',e=>{if(!e.target.closest('.filter-wrap'))pop.classList.remove('open');});
document.getElementById('fApply').addEventListener('click',()=>{ fIpVal=document.getElementById('fIp').value.trim(); filterBtn.classList.toggle('act',!!fIpVal); pop.classList.remove('open'); load(); });
document.getElementById('fReset').addEventListener('click',()=>{ document.getElementById('fIp').value=''; fIpVal=''; filterBtn.classList.remove('act'); pop.classList.remove('open'); load(); });

document.getElementById('themeBtn').addEventListener('click',()=>document.documentElement.classList.toggle('dark'));
load();
</script>
</body>
</html>
