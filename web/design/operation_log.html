<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>操作日志 · 核心管理平台</title>
<style>
/* EgoAdmin 后台 · 操作日志 — 令牌取自 DESIGN.md（亮/暗双主题） */
:root{
  --bg:#FAFBFC; --surface:#FFFFFF; --surface-2:#F4F6F8; --surface-3:#EAEDF1;
  --fg:#14181F; --text:#3A4250; --muted:#6B7280; --faint:#9AA3B2;
  --border:#E6E8EC; --border-strong:#D5D9E0;
  --accent:#1573E6; --accent-hover:#1267CC; --accent-press:#0F58B0; --accent-weak:#E8F1FC; --accent-text:#1166C4;
  --cyan:#19B6DD; --cyan-weak:#E2F6FC; --success:#17B26A; --success-weak:#E6F7EF; --warning:#F5A623; --warning-weak:#FDF3E2; --danger:#E5484D; --danger-weak:#FCEBEC;
  --font-display:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
  --font-body:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
  --font-mono:"JetBrains Mono","SF Mono","Cascadia Code",ui-monospace,Menlo,Consolas,monospace;
  --r-sm:6px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-pill:999px;
  --shadow-sm:0 2px 6px rgb(16 24 40 / .06); --shadow-md:0 6px 18px -6px rgb(16 24 40 / .12); --shadow-lg:0 16px 40px -12px rgb(16 24 40 / .18);
  --focus:0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent);
  --ease:cubic-bezier(.2,0,0,1); --ease-out:cubic-bezier(.16,1,.3,1);
}
.dark{
  --bg:#0E1116; --surface:#161B22; --surface-2:#1C232D; --surface-3:#232B36; --fg:#E6EAF0; --text:#C2C9D4; --muted:#8B95A4; --faint:#6A7382; --border:#262C36; --border-strong:#38414E;
  --accent:#4B9CF5; --accent-hover:#62A9F7; --accent-press:#3C8AE6; --accent-weak:#17304E; --accent-text:#6FB0F7; --cyan:#43C6E8; --cyan-weak:#16323C; --success-weak:#10261C; --warning-weak:#2A2110; --danger-weak:#2C1517;
  --shadow-md:0 6px 18px -6px rgb(0 0 0 / .5); --shadow-lg:0 16px 40px -12px rgb(0 0 0 / .6);
}
*{box-sizing:border-box} html,body{margin:0; height:100%}
body{background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:14px; -webkit-font-smoothing:antialiased; transition:background .3s var(--ease), color .3s var(--ease)}
h1,h2,h3{font-family:var(--font-display); color:var(--fg); margin:0}
.mono{font-family:var(--font-mono)} .num{font-variant-numeric:tabular-nums}

/* 顶部导航 */
.topnav{position:sticky; top:0; z-index:50; display:flex; align-items:center; gap:30px; height:60px; padding:0 24px; background:var(--surface); border-bottom:1px solid var(--border)}
.topnav .brand{display:flex; align-items:center; gap:9px; font-family:var(--font-display); font-weight:680; color:var(--fg); font-size:15.5px}
.topnav .menu{display:flex; gap:26px; align-self:stretch}
.topnav .menu a{position:relative; display:inline-flex; align-items:center; font-size:14px; font-weight:500; color:var(--text); text-decoration:none; padding:0 2px; cursor:pointer; transition:color .18s var(--ease)}
.topnav .menu a::after{content:""; position:absolute; left:0; right:0; bottom:0; height:2px; background:transparent; border-radius:2px 2px 0 0; transition:background .18s var(--ease)}
.topnav .menu a:hover{color:var(--fg)}
.topnav .menu a.on{color:var(--fg); font-weight:600} .topnav .menu a.on::after{background:var(--accent)}
.topnav .rt{margin-left:auto; display:flex; align-items:center; gap:8px}
.icon-btn{width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:var(--r-md); color:var(--muted); cursor:pointer; border:0; background:none; transition:.15s var(--ease)}
.icon-btn:hover{background:var(--surface-2); color:var(--fg)}
.lang{font-size:12.5px; color:var(--muted); padding:0 8px; cursor:pointer}
.avatar{display:flex; align-items:center; gap:8px; padding:5px 8px 5px 6px; border-radius:var(--r-pill); cursor:pointer; text-decoration:none} .avatar:hover{background:var(--surface-2)}
.avatar .pic{width:28px; height:28px; border-radius:50%; background:var(--accent-weak); color:var(--accent-text); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600}
.avatar .nm{font-size:13.5px; color:var(--text)}
/* 二级导航 */
.grp{position:relative; display:flex; align-items:center}
.grp .grp-btn{position:relative; display:inline-flex; align-items:center; gap:5px; height:100%; font:inherit; font-size:14px; font-weight:500; color:var(--text); background:none; border:0; padding:0 2px; cursor:pointer; transition:color .18s var(--ease)}
.grp .grp-btn .cv{color:var(--faint); transition:transform .18s var(--ease)}
.grp:hover .grp-btn{color:var(--fg)} .grp:hover .grp-btn .cv{transform:rotate(180deg)}
.grp .grp-btn::after{content:""; position:absolute; left:0; right:13px; bottom:0; height:2px; background:transparent; border-radius:2px 2px 0 0; transition:background .18s var(--ease)}
.grp .grp-btn.on{color:var(--fg); font-weight:600} .grp .grp-btn.on::after{background:var(--accent)}
.topnav .menu .grp-drop{position:absolute; top:100%; left:-8px; min-width:152px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); box-shadow:var(--shadow-md); padding:6px; display:flex; flex-direction:column; opacity:0; visibility:hidden; transform:translateY(4px); transition:opacity .16s var(--ease), transform .16s var(--ease); z-index:60}
.grp:hover .grp-drop{opacity:1; visibility:visible; transform:translateY(0)}
.topnav .menu .grp-drop a{display:block; height:auto; font-size:13.5px; font-weight:500; color:var(--text); text-decoration:none; padding:8px 12px; border-radius:var(--r-sm); white-space:nowrap; transition:.12s var(--ease)}
.topnav .menu .grp-drop a::after{display:none}
.topnav .menu .grp-drop a:hover{background:var(--surface-2); color:var(--fg)}
.topnav .menu .grp-drop a.cur{color:var(--accent-text); background:var(--accent-weak); font-weight:550}

/* 页面 + 卡片 */
.page{max-width:1440px; margin:0 auto; padding:24px}
.pagemain{background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px 24px}
.pm-head{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap}
.pm-head h1{font-size:26px; font-weight:620; letter-spacing:-.012em}
.pm-head .tools{display:flex; align-items:center; gap:10px}
.search{position:relative}
.search svg{position:absolute; left:11px; top:9px; color:var(--faint)}
.search input{height:36px; width:220px; font:inherit; font-size:14px; color:var(--fg); background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--r-md); padding:0 12px 0 34px}
.search input:focus{outline:none; border-color:var(--accent); box-shadow:var(--focus)}
.btn{font:inherit; font-size:14px; font-weight:550; cursor:pointer; border-radius:var(--r-md); padding:8px 14px; border:1px solid transparent; display:inline-flex; align-items:center; gap:7px; transition:.18s var(--ease)}
.btn:focus-visible{outline:none; box-shadow:var(--focus)}
.btn-secondary{background:var(--surface); color:var(--text); border-color:var(--border-strong)} .btn-secondary:hover{border-color:var(--accent); color:var(--accent-text)}
.btn-primary{background:var(--accent); color:#fff} .btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{background:none;color:var(--muted);border-color:transparent} .btn-ghost:hover{background:var(--surface-2);color:var(--fg)}
.filter-wrap{position:relative}
.filter-btn.act{border-color:var(--accent); color:var(--accent-text)}
.filter-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.popover{position:absolute; right:0; top:44px; width:330px; max-width:calc(100vw - 48px); background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); box-shadow:var(--shadow-lg); padding:16px; z-index:60; display:none}
.popover.open{display:block}
.popover label{display:block; font-size:13px; color:var(--text); margin:0 0 7px; font-weight:500}
.popover input{width:100%; height:34px; font:inherit; font-size:13px; color:var(--fg); background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--r-md); padding:0 10px; margin-bottom:14px}
.popover input:focus{outline:none; border-color:var(--accent); box-shadow:var(--focus)}
.popover .range{display:flex; gap:8px; align-items:center} .popover .range input{margin-bottom:0; flex:1; min-width:0; width:auto} .popover .range span{color:var(--faint); flex:none}
.popover .pf{display:flex; justify-content:flex-end; gap:8px; margin-top:16px}

.tbl{width:100%; border-collapse:collapse; font-size:14px}
.tbl th{text-align:left; font-size:13px; font-weight:600; color:var(--text); background:var(--surface-2); padding:12px 16px; border-bottom:1px solid var(--border); white-space:nowrap}
.tbl th:first-child{border-top-left-radius:var(--r-md)} .tbl th:last-child{border-top-right-radius:var(--r-md)}
.tbl td{padding:0 16px; height:52px; color:var(--text); border-bottom:1px solid var(--border); vertical-align:middle; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:280px}
.tbl tbody tr:hover{background:var(--accent-weak)}
.tbl .ev{color:var(--fg)}
.tag{display:inline-flex; align-items:center; font-size:12px; font-weight:550; padding:2px 9px; border-radius:var(--r-pill); color:var(--text); background:var(--surface-2); border:1px solid var(--border)}
.tag.login{color:var(--cyan); background:var(--cyan-weak); border:0}
.empty{text-align:center; padding:52px 0; color:var(--muted); display:flex; flex-direction:column; align-items:center}
.empty .ei{width:60px; height:60px; border-radius:50%; background:var(--surface-2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--faint); margin-bottom:14px}
.empty h4{font-size:15px; font-weight:600; color:var(--fg); margin:0}
.empty p{font-size:13px; color:var(--muted); margin:5px 0 0}
.empty .ea{margin-top:16px}
.sk-body .sk-row{display:flex; align-items:center; gap:18px; padding:0 16px; height:52px; border-bottom:1px solid var(--border)}
.sk{position:relative; overflow:hidden; background:var(--surface-2); border-radius:6px; height:12px}
.sk::after{content:""; position:absolute; inset:0; transform:translateX(-100%); background:linear-gradient(90deg,transparent,color-mix(in oklab,var(--surface) 75%,transparent),transparent); animation:shimmer 1.3s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}
@media (prefers-reduced-motion:reduce){.sk::after{animation:none}}
.pager{display:flex; align-items:center; justify-content:flex-end; gap:16px; margin-top:18px; color:var(--muted); font-size:13px}
.pager b{color:var(--fg)} .pager .pg{display:flex; gap:6px}
.pager .pg span{min-width:30px; height:30px; display:inline-flex; align-items:center; justify-content:center; border-radius:var(--r-sm); border:1px solid var(--border); cursor:pointer; font-size:13px; transition:.15s var(--ease)}
.pager .pg span.on{background:var(--accent); color:#fff; border-color:var(--accent)} .pager .pg span.dis{color:var(--faint); cursor:not-allowed}
.pager .pg span:not(.on):not(.dis):hover{background:var(--surface-2)}
.toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--fg); color:var(--bg); font-size:13.5px; padding:11px 18px; border-radius:var(--r-pill); box-shadow:var(--shadow-lg); opacity:0; pointer-events:none; transition:.24s var(--ease-out); z-index:200}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
@media (max-width:820px){ .topnav .menu{display:none} .page{padding:16px} .tbl .dept-col,.tbl .ip-col{display:none} }
@media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>

<nav class="topnav" data-od-id="topnav">
  <div class="brand"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.6"><path d="M12 2v20M2 12h20M5 5l14 14M19 5L5 19" stroke-linecap="round"/></svg>核心管理平台</div>
  <div class="menu">
    <div class="grp"><button type="button" class="grp-btn on">系统设置 <svg class="cv" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="grp-drop"><a href="role.html">角色管理</a><a href="online_user.html">在线用户</a><a href="operation_log.html" class="cur">操作日志</a></div></div>
    <div class="grp"><button type="button" class="grp-btn">用户管理 <svg class="cv" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="grp-drop"><a href="user.html">用户管理</a><a href="organization.html">组织管理</a></div></div>
  </div>
  <div class="rt">
    <button class="icon-btn" title="搜索"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg></button>
    <button class="icon-btn" id="themeBtn" title="切换主题"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3a9 9 0 1 0 9 9c-5 0-9-4-9-9z"/></svg></button>
    <span class="lang">中 / EN</span>
    <a class="avatar" href="personal.html"><span class="pic">A</span><span class="nm">admin</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M6 9l6 6 6-6" stroke-linecap="round"/></svg></a>
  </div>
</nav>

<div class="page">
  <section class="pagemain" data-od-id="log-list">
    <div class="pm-head">
      <h1>操作日志</h1>
      <div class="tools">
        <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg><input id="kw" placeholder="搜索事件内容"></div>
        <div class="filter-wrap">
          <button class="btn btn-secondary filter-btn" id="filterBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5h18l-7 8v6l-4 2v-8z" stroke-linejoin="round"/></svg>筛选<span class="filter-dot" id="fdot" style="display:none"></span></button>
          <div class="popover" id="pop">
            <label>操作人</label>
            <input id="fOp" placeholder="输入操作人账号">
            <label>操作时间</label>
            <div class="range"><input type="date" id="fStart"><span>—</span><input type="date" id="fEnd"></div>
            <div class="pf"><button class="btn btn-ghost" id="fReset">重置</button><button class="btn btn-primary" id="fApply">确定</button></div>
          </div>
        </div>
      </div>
    </div>
    <table class="tbl">
      <thead><tr><th style="width:13%">模块名称</th><th style="width:9%">类型</th><th>事件</th><th style="width:10%">操作人</th><th class="dept-col" style="width:12%">部门</th><th class="ip-col" style="width:12%">客户端 IP</th><th style="width:16%">操作时间</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="pager">
      <span>共 <b class="num" id="total">0</b> 条</span><span>每页 10 条</span>
      <div class="pg" id="pg"></div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
const LOGS=[
  {m:"用户-登录退出",t:"登录",ev:"用户登录成功",op:"admin",dept:"—",ip:"10.21.6.18",time:"2026-06-27 10:28:51"},
  {m:"角色管理",t:"新增",ev:"新增角色「只读审计」",op:"admin",dept:"—",ip:"10.21.6.18",time:"2026-06-27 09:14:02"},
  {m:"组织管理",t:"编辑",ev:"编辑组织「后端组」负责人",op:"chenh",dept:"成都研发中心",ip:"10.21.6.32",time:"2026-06-27 08:55:40"},
  {m:"用户管理",t:"重置密码",ev:"重置用户「lina」登录密码",op:"admin",dept:"—",ip:"10.21.6.18",time:"2026-06-26 18:02:13"},
  {m:"用户管理",t:"禁用",ev:"禁用用户「demo」",op:"chenh",dept:"成都研发中心",ip:"10.21.6.32",time:"2026-06-26 16:40:09"},
  {m:"在线用户",t:"强制退出",ev:"强制退出「demo」当前会话",op:"admin",dept:"—",ip:"10.21.6.18",time:"2026-06-26 15:22:31"},
  {m:"角色管理",t:"授权",ev:"调整「组织管理员」菜单与接口权限",op:"admin",dept:"—",ip:"10.21.6.18",time:"2026-06-26 11:10:44"},
  {m:"用户-登录退出",t:"登录",ev:"用户登录成功",op:"lina",dept:"平台运营",ip:"10.21.6.51",time:"2026-06-26 09:01:18"},
  {m:"组织管理",t:"新增",ev:"新增组织「前端组」",op:"chenh",dept:"成都研发中心",ip:"10.21.6.32",time:"2026-06-25 17:33:27"},
  {m:"用户管理",t:"新增",ev:"新增用户「zhaoq」并分配角色",op:"admin",dept:"—",ip:"10.21.6.18",time:"2026-06-25 14:08:55"},
  {m:"用户-登录退出",t:"退出",ev:"用户退出登录",op:"zhaoq",dept:"成都研发中心",ip:"10.21.6.77",time:"2026-06-25 12:30:10"},
  {m:"角色管理",t:"编辑",ev:"编辑角色「访客」描述",op:"admin",dept:"—",ip:"10.21.6.18",time:"2026-06-24 19:45:33"},
  {m:"组织管理",t:"删除",ev:"删除空组织「测试组」",op:"admin",dept:"—",ip:"10.21.6.18",time:"2026-06-24 15:12:08"},
  {m:"用户-登录退出",t:"登录",ev:"用户登录成功",op:"admin",dept:"—",ip:"10.21.6.18",time:"2026-06-24 09:00:02"}
];
const PAGE=10; let page=1, filt={op:"",start:"",end:""};
const rowsEl=document.getElementById('rows'),totalEl=document.getElementById('total'),pgEl=document.getElementById('pg'),kw=document.getElementById('kw');
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function filtered(){
  const q=kw.value.trim();
  return LOGS.filter(l=>(!q||l.ev.includes(q))&&(!filt.op||l.op.includes(filt.op))&&(!filt.start||l.time.slice(0,10)>=filt.start)&&(!filt.end||l.time.slice(0,10)<=filt.end));
}
let loadT;
function skeletonHTML(){
  const bar=w=>`<div class="sk" style="width:${w}"></div>`;
  const ws=[['12%','8%','30%','10%','12%'],['11%','9%','26%','9%','10%'],['13%','8%','32%','11%','12%'],['12%','9%','24%','8%','11%'],['11%','8%','30%','10%','12%'],['13%','9%','26%','9%','10%']];
  return `<tr><td colspan="7" style="padding:0;border:0"><div class="sk-body">`+ws.map(r=>`<div class="sk-row">${bar(r[0])}${bar(r[1])}${bar(r[2])}${bar(r[3])}<div style="margin-left:auto">${bar(r[4])}</div></div>`).join('')+`</div></td></tr>`;
}
function emptyRow(){
  const filtering=kw.value.trim()||filt.op||filt.start||filt.end;
  if(filtering) return `<tr><td colspan="7"><div class="empty"><div class="ei"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg></div><h4>没有匹配的日志</h4><p>试试调整事件关键词、操作人或时间范围。</p><button class="btn btn-secondary ea" data-empty="reset">清空筛选</button></div></td></tr>`;
  return `<tr><td colspan="7"><div class="empty"><div class="ei"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 5h16v14H4zM4 9h16M9 5v14" stroke-linejoin="round"/></svg></div><h4>暂无操作日志</h4><p>系统还没有记录任何操作。</p></div></td></tr>`;
}
function load(){ rowsEl.innerHTML=skeletonHTML(); pgEl.innerHTML=''; clearTimeout(loadT); loadT=setTimeout(()=>render(),600); }
function render(){
  const list=filtered(); totalEl.textContent=list.length;
  const pages=Math.max(1,Math.ceil(list.length/PAGE)); if(page>pages)page=pages;
  const slice=list.slice((page-1)*PAGE,page*PAGE);
  if(!slice.length){ rowsEl.innerHTML=emptyRow(); pgEl.innerHTML=''; return; }
  rowsEl.innerHTML=slice.map(l=>`<tr>
    <td>${esc(l.m)}</td>
    <td><span class="tag ${l.t==='登录'||l.t==='退出'?'login':''}">${esc(l.t)}</span></td>
    <td class="ev" title="${esc(l.ev)}">${esc(l.ev)}</td>
    <td class="mono">${esc(l.op)}</td>
    <td class="dept-col">${esc(l.dept)}</td>
    <td class="ip-col mono num">${esc(l.ip)}</td>
    <td class="mono num">${esc(l.time)}</td></tr>`).join('');
  let pg=`<span class="${page<=1?'dis':''}" data-p="${page-1}">‹</span>`;
  for(let i=1;i<=pages;i++)pg+=`<span class="${i===page?'on':''}" data-p="${i}">${i}</span>`;
  pg+=`<span class="${page>=pages?'dis':''}" data-p="${page+1}">›</span>`; pgEl.innerHTML=pg;
}
kw.addEventListener('input',()=>{page=1;render();});
rowsEl.addEventListener('click',e=>{ const em=e.target.closest('[data-empty]'); if(!em)return; kw.value=''; document.getElementById('fOp').value=''; document.getElementById('fStart').value=''; document.getElementById('fEnd').value=''; filt={op:"",start:"",end:""}; fdot.style.display='none'; filterBtn.classList.remove('act'); page=1; load(); });
pgEl.addEventListener('click',e=>{const s=e.target.closest('[data-p]'); if(!s||s.classList.contains('dis')||s.classList.contains('on'))return; page=+s.dataset.p; render();});

/* 筛选弹层 */
const pop=document.getElementById('pop'),filterBtn=document.getElementById('filterBtn'),fdot=document.getElementById('fdot');
filterBtn.addEventListener('click',e=>{e.stopPropagation(); pop.classList.toggle('open');});
document.addEventListener('click',e=>{if(!e.target.closest('.filter-wrap'))pop.classList.remove('open');});
document.getElementById('fApply').addEventListener('click',()=>{
  filt.op=document.getElementById('fOp').value.trim(); filt.start=document.getElementById('fStart').value; filt.end=document.getElementById('fEnd').value;
  const act=!!(filt.op||filt.start||filt.end); fdot.style.display=act?'inline-block':'none'; filterBtn.classList.toggle('act',act);
  page=1; pop.classList.remove('open'); load();
});
document.getElementById('fReset').addEventListener('click',()=>{
  document.getElementById('fOp').value=''; document.getElementById('fStart').value=''; document.getElementById('fEnd').value='';
  filt={op:"",start:"",end:""}; fdot.style.display='none'; filterBtn.classList.remove('act'); page=1; pop.classList.remove('open'); load();
});

document.getElementById('themeBtn').addEventListener('click',()=>document.documentElement.classList.toggle('dark'));
load();
</script>
</body>
</html>
