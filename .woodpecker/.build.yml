clone:
  git:
    image: woodpeckerci/plugin-git:2.0.3
    settings:
      recursive: true
      partial: false
      depth: 10

when:
  - event: [push, tag]

pipeline:
  frontend-build:
    image: node:22-alpine
    environment:
      CI: "true"
    commands:
      - apk add --no-cache git
      - corepack enable
      - corepack prepare pnpm@11 --activate
      - cd web
      - pnpm install
      - pnpm run build
    when:
      - event: [push, tag]

  build:
    image: golang:1.26.2-bullseye
    privileged: true
    volumes:
      - /home/egoadmin/drone/cache/buf:/root/.cache/buf
    environment:
      GO111MODULE: "on"
      GOPROXY: "https://goproxy.cn"
    commands:
      - sed -i 's/deb.debian.org/mirrors.ustc.edu.cn/g' /etc/apt/sources.list
      - apt update && apt install -y gcc g++ make unzip
      - wget -q https://archive-1256457449.cos.ap-chengdu.myqcloud.com/mirrors/protoc/protoc-3.20.0-linux-x86_64.zip -O protoc.zip && unzip protoc.zip -d /usr/local && rm protoc.zip
      - make install && make gen
    depends_on:
      - frontend-build
    when:
      - event: [push, tag]

  build-gateway-docker:
    image: plugins/docker
    depends_on:
      - build
    settings:
      context: .
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags: ${CI_COMMIT_TAG}
      build_args:
        - SERVICE=gateway
        - GOPROXY=https://goproxy.cn
      repo: egoadmin/egoadmin-gateway
      dockerfile: cmd/gateway/Dockerfile
    when:
      - event: [push, tag]

  build-user-docker:
    image: plugins/docker
    depends_on:
      - build
    settings:
      context: .
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags: ${CI_COMMIT_TAG}
      build_args:
        - SERVICE=user
        - GOPROXY=https://goproxy.cn
      repo: egoadmin/egoadmin-user
      dockerfile: cmd/user/Dockerfile
    when:
      - event: [push, tag]

  deploy-dev:
    image: appleboy/drone-ssh
    depends_on:
      - build-gateway-docker
      - build-user-docker
    settings:
      host:
        from_secret: kube-ssh-host
      username:
        from_secret: kube-ssh-user
      password:
        from_secret: kube-ssh-pass
      port:
        from_secret: kube-ssh-port
      script:
        from_secret: ks_script
    when:
      - event: [push, tag]
