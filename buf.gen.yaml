version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/egoadmin/egoadmin/api/gen/go
    except:
      - buf.build/googleapis/googleapis
      - buf.build/grpc-ecosystem/grpc-gateway
      - buf.build/srikrsna/protoc-gen-gotag
  cc_enable_arenas: false
  java_multiple_files: true
  java_package_prefix: com.egoadmin
  java_string_check_utf8: false
plugins:
  - name: go
    out: api/gen/go
    opt: paths=source_relative
  - name: go-grpc
    out: api/gen/go
    opt: paths=source_relative,require_unimplemented_servers=false
  - name: go-errors
    out: api/gen/go
    opt: paths=source_relative
  - name: grpc-gateway
    out: api/gen/go
    opt: paths=source_relative
  - name: go-http
    out: api/gen/go
    opt: paths=source_relative,omitempty=true,apiprefix=/api
  - name: api-catalog
    out: .
    strategy: all
    opt: catalog=api/catalog/api-catalog.json,manifest=web/src/api/api-manifest.ts
  - name: openapiv2
    out: api/openapi
    strategy: all
    opt: allow_merge=true,merge_file_name=openapi
  - name: openapiv2
    out: api/openapi
    strategy: all
    opt: allow_merge=true,merge_file_name=openapi,output_format=yaml
  - name: cpp
    out: api/gen/cpp
  - name: java
    out: api/gen/java
  # - name: js
  #   out: api/gen/js
  # - name: csharp
  #   out: api/gen/csharp
  - name: python
    out: api/gen/python
  - name: php
    out: api/gen/php
