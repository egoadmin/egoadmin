  string phone = 9 [
    (tagger.tags) = "validate:\"required,gte=1,lte=30\" label:\"手机号\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "手机号"
      description: "中国手机不带国家代码，国际手机号格式为：国家代码-手机号"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // Email 邮箱
  string email = 10 [(tagger.tags) = "validate:\"omitempty,gte=3,lte=50\" label:\"邮箱\""];
  // Nickname 昵称
