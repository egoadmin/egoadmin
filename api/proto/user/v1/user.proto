  string password = 6 [(tagger.tags) = "validate:\"omitempty\" label:\"密码\" copier:\"HiddenPasswordToRPC\""];
  // Name 姓名
  string name = 7 [
    (tagger.tags) = "validate:\"required,gte=1,lte=60\" label:\"姓名\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "姓名"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // Avatar 头像 CDN URL。响应不返回对象存储 key。
  string avatar = 8;
  // AvatarReferenceId 头像公开引用ID，格式如 ref-...。
