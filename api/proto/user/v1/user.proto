// LoginRequest 登录请求
message LoginRequest {
  // Username 用户名/手机号
  string username = 1 [
    (tagger.tags) = "validate:\"omitempty,gte=1,lte=30\" label:\"用户名\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "用户名"
    }
  ];
  // Token 续期密钥,续期时不需要用户名密码
  string token = 3;
  // CaptchaId 验证码id(token续期时不需要验证码)
  string captcha_id = 4;
  // CaptchaCode 验证字符串
  string captcha_code = 5;
  // UA 客户端设备标识
  string ua = 6;
  // PasswordCipher RSA-OAEP-SHA256 加密后的登录载荷
  string password_cipher = 7 [
    (tagger.tags) = "validate:\"omitempty\" label:\"登录密文\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "登录密文";
      description: "使用 GetLoginCrypto 返回的 public_key 加密 JSON 登录载荷后得到的 Base64 字符串。"
    }
  ];
  // KeyId 登录加密密钥标识
  string key_id = 8 [
    (tagger.tags) = "validate:\"omitempty\" label:\"登录加密密钥\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "登录加密密钥"
    }
  ];
  // ChallengeId 一次性登录挑战标识
  string challenge_id = 9 [
    (tagger.tags) = "validate:\"omitempty\" label:\"登录挑战\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "登录挑战"
    }
  ];
}

// LoginResponse 登录响应
message LoginResponse {
  // UserTyp 用户类型, 1:平台用户
  int32 user_typ = 1;
  // Menus 菜单列表
  string menus = 2;
  // ExpiredAt 过期时间
  google.protobuf.Timestamp expired_at = 3;
  // Token 登录token，存在过期时间，在过期前需刷新token
  string token = 4;
  // RefreshToken 刷新令牌，刷新时提交到 LoginRequest.token
  string refresh_token = 5;
}

// GetLoginCryptoRequest 获取登录加密参数请求
message GetLoginCryptoRequest {
  // Username 用户名/手机号
  string username = 1 [
    (tagger.tags) = "validate:\"required,gte=1,lte=30\" label:\"用户名\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "用户名"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // UA 客户端设备标识
  string ua = 2 [
    (tagger.tags) = "validate:\"required\" label:\"客户端设备标识\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "客户端设备标识"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // Action 使用场景,如 login、center.edit_password、center.edit_info
  string action = 3 [
    (tagger.tags) = "validate:\"omitempty,gte=1,lte=64\" label:\"加密场景\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "加密场景";
      description: "用于将一次性 challenge 绑定到具体业务场景，未填写时按 login 处理。"
    }
  ];
}

// GetLoginCryptoResponse 获取登录加密参数响应
message GetLoginCryptoResponse {
  // KeyId 登录加密密钥标识
  string key_id = 1;
  // PublicKey RSA 公钥 PEM
  string public_key = 2;
  // ChallengeId 一次性登录挑战标识
  string challenge_id = 3;
  // Nonce 一次性随机数
  string nonce = 4;
  // Algorithm 加密算法，固定为 RSA-OAEP-SHA256
  string algorithm = 5;
  // ExpiresAt challenge 过期时间
  google.protobuf.Timestamp expires_at = 6;
}

