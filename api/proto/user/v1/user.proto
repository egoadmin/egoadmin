    },
    (google.api.field_behavior) = REQUIRED
  ];
  // Phone 手机号,中国手机不带国家代码，国际手机号格式为：国家代码-手机号
  string phone = 6 [
    (tagger.tags) = "validate:\"required,gte=1,lte=30\" label:\"手机号\"",
