  // Gender 性别,0:保密,1:男,2:女
  int32 gender = 12 [
    (tagger.tags) = "validate:\"required,oneof=1 2\" label:\"性别\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "性别"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // FirstLogin 是否首次登录,1:是,2:不是
  int32 first_login = 13 [(tagger.tags) = "validate:\"omitempty,oneof=1 2\" label:\"是否首次登录\""];
  // LastLoginIP 最后登录IP
  string last_login_ip = 14 [(tagger.tags) = "copier:\"LastLoginIP\""];
  // LastLoginAt 最后登录时间
  google.protobuf.Timestamp last_login_at = 15 [(tagger.tags) = "copier:\"LastLoginAtToRPC\""];
  // UserStatus 用户状态,1有效,2无效
  int32 user_status = 16 [
    (tagger.tags) = "validate:\"required,oneof=1 2\" label:\"用户状态\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "用户状态"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // UserType 用户类型,1:后台用户
  int32 user_type = 17 [(tagger.tags) = "validate:\"omitempty,oneof=1\" label:\"用户类型\""];
  // UserOnline 是否在线 1:在线,2:不在线
  int32 user_online = 18 [(tagger.tags) = "validate:\"omitempty,oneof=1 2\" label:\"是否在线\""];
  // Remark 备注
  string remark = 19 [(tagger.tags) = "label:\"备注\""];
  // DeptId 组织id
  uint64 dept_id = 20 [
    (tagger.tags) = "validate:\"required\" copier:\"DeptID\" label:\"组织\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "组织"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // RoleIds 角色ID列表
  repeated uint64 role_ids = 21 [(tagger.tags) = "copier:\"RoleIdsToRPC\""];
  // RoleNames 角色名称列表
