syntax = "proto3";

package user.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "tagger/tagger.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "角色服务"
    description: "服务名: user.v1.RoleService"
    version: "1.0"
    license: {
      name: "MIT"
    }
  }
  schemes: HTTP
  consumes: "application/json"
  produces: "application/json"
  security_definitions: {
    security: {
      key: "BearerAuth"
      value: {
        type: TYPE_API_KEY
        in: IN_HEADER
        name: "Authorization"
        description: "JWT 认证头。Swagger UI 中请输入完整值: Bearer <token>"
      }
    }
  }
};

// RoleService 角色服务
service RoleService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    description: "角色服务,服务名: user.v1.RoleService"
  };

  // AddRole 新增角色
  rpc AddRole(AddRoleRequest) returns (AddRoleResponse) {
    option (google.api.http) = {
      post: "/user.v1.RoleService/AddRole",
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "角色服务,服务名: user.v1.RoleService"
      tags: "RoleService"
      description: "认证: 需要 Authorization: Bearer <token>，并需要接口权限 USER.V1.ROLESERVICE/ADDROLE。"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }
  // DeleteRole 删除角色
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse) {
    option (google.api.http) = {
      post: "/user.v1.RoleService/DeleteRole",
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "角色服务,服务名: user.v1.RoleService"
      tags: "RoleService"
      description: "认证: 需要 Authorization: Bearer <token>，并需要接口权限 USER.V1.ROLESERVICE/DELETEROLE。"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  // CheckDeleteRole 检查组角色是否可删除
  rpc CheckDeleteRole(CheckDeleteRoleRequest) returns (CheckDeleteRoleResponse) {
    option (google.api.http) = {
      post: "/user.v1.RoleService/CheckDeleteRole",
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "角色服务,服务名: user.v1.RoleService"
      tags: "RoleService"
      description: "认证: 需要 Authorization: Bearer <token>，并需要接口权限 USER.V1.ROLESERVICE/CHECKDELETEROLE。"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }

  // UpdateRole 修改角色
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse) {
    option (google.api.http) = {
      post: "/user.v1.RoleService/UpdateRole",
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "角色服务,服务名: user.v1.RoleService"
      tags: "RoleService"
      description: "认证: 需要 Authorization: Bearer <token>，并需要接口权限 USER.V1.ROLESERVICE/UPDATEROLE。"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }
  // GetRole 查询角色
  rpc GetRole(GetRoleRequest) returns (GetRoleResponse) {
    option (google.api.http) = {
      post: "/user.v1.RoleService/GetRole",
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "角色服务,服务名: user.v1.RoleService"
      tags: "RoleService"
      description: "认证: 需要 Authorization: Bearer <token>，并需要接口权限 USER.V1.ROLESERVICE/GETROLE。"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }
  // GetRoleList 获取角色列表
  rpc GetRoleList(GetRoleListRequest) returns (GetRoleListResponse) {
    option (google.api.http) = {
      post: "/user.v1.RoleService/GetRoleList",
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "角色服务,服务名: user.v1.RoleService"
      tags: "RoleService"
      description: "认证: 需要 Authorization: Bearer <token>，并需要接口权限 USER.V1.ROLESERVICE/GETROLELIST。"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }
  // GetRoleAll 获取所有角色
  rpc GetRoleAll(GetRoleAllRequest) returns (GetRoleAllResponse) {
    option (google.api.http) = {
      post: "/user.v1.RoleService/GetRoleAll",
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      tags: "角色服务,服务名: user.v1.RoleService"
      tags: "RoleService"
      description: "认证: 需要 Authorization: Bearer <token>，并需要接口权限 USER.V1.ROLESERVICE/GETROLEALL。"
      security: {
        security_requirement: {
          key: "BearerAuth"
          value: {}
        }
      }
    };
  }
}

// AddRoleRequest 添加角色请求
message AddRoleRequest {
  // Role 角色信息
  Role role = 1 [
    (tagger.tags) = "validate:\"required\" label:\"角色信息\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "角色信息"
    },
    (google.api.field_behavior) = REQUIRED
  ];
}

// AddRoleResponse 添加角色响应
message AddRoleResponse {
  // Id 角色id
  uint64 id = 1;
}

// DeleteRoleRequest 删除角色请求
message DeleteRoleRequest {
  // Id 角色id
  uint64 id = 1 [
    (tagger.tags) = "validate:\"required\" label:\"角色\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "角色"
    },
    (google.api.field_behavior) = REQUIRED
  ];
}

// DeleteRoleResponse 删除角色响应
message DeleteRoleResponse {}

// CheckDeleteRoleRequest 检查组角色是否可删除请求
message CheckDeleteRoleRequest {
  // Id 角色id
  uint64 id = 1 [
    (tagger.tags) = "validate:\"required\" label:\"角色\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "角色"
    },
    (google.api.field_behavior) = REQUIRED
  ];
}

// CheckDeleteRoleResponse 检查角色是否可删除响应
message CheckDeleteRoleResponse {
  // IsAllow 是否允许删除
  bool is_allow = 1;
  // Msg 不允许删除时的提示
  string msg = 2;
}

// UpdateRoleRequest 修改角色请求
message UpdateRoleRequest {
  // Id 角色id
  uint64 id = 1 [
    (tagger.tags) = "validate:\"required\" label:\"角色\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "角色"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // Role 角色信息
  Role role = 2 [
    (tagger.tags) = "validate:\"required\" label:\"角色信息\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "角色信息"
    },
    (google.api.field_behavior) = REQUIRED
  ];
}

// UpdateRoleResponse 修改角色响应
message UpdateRoleResponse {}

// GetRoleRequest 获取角色请求
message GetRoleRequest {
  // Id 角色id
  uint64 id = 1 [
    (tagger.tags) = "validate:\"required\" label:\"角色\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "角色"
    },
    (google.api.field_behavior) = REQUIRED
  ];
}

// GetRoleResponse 获取角色响应
message GetRoleResponse {
  // Role 角色信息
  Role role = 1;
}

// GetRoleListRequest 获取角色列表请求
message GetRoleListRequest {
  // Page  int 页码,值>=1
  int32 page = 1 [
    (tagger.tags) = "validate:\"required,gte=1\" label:\"页码\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "页码"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // Limit int 单页数量,值>=1,<=20
  int32 limit = 2 [
    (tagger.tags) = "validate:\"required,gte=1,lte=50\" label:\"单页显示数量\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "单页显示数量"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // Sort 排序字段,如name(姓名)
  string sort = 3 [(tagger.tags) = "validate:\"omitempty,gte=1\" label:\"排序字段\""];
  // Order 排序方式,值为desc(降序)及asc(升序)
  string order = 4 [(tagger.tags) = "validate:\"omitempty,oneof=desc asc\" label:\"排序方式\""];
  // Name 角色名称
  string name = 5 [(tagger.tags) = "validate:\"omitempty,gte=1\" label:\"角色名称\""];
}

// GetRoleListResponse 获取角色列表响应
message GetRoleListResponse {
  // Total 全部数据量
  int32 total = 1;
  // Roles 角色列表
  repeated Role roles = 2;
}

// GetRoleAllRequest 获取所有角色请求
message GetRoleAllRequest {}

// GetRoleAllResponse 获取所有角色响应
message GetRoleAllResponse {
  // Roles 角色列表
  repeated Role roles = 1;
}

// Role 角色
message Role {
  // Id 用户id
  uint64 id = 1 [(tagger.tags) = "copier:\"ID\""];
  // CreatedAt 创建时间
  google.protobuf.Timestamp created_at = 2 [(tagger.tags) = "copier:\"CreatedAtToRPC\""];
  // UpdatedAt 修改时间
  google.protobuf.Timestamp updated_at = 3 [(tagger.tags) = "copier:\"UpdatedAtToRPC\""];
  // DeletedAt 删除时间
  google.protobuf.Timestamp deleted_at = 4 [(tagger.tags) = "copier:\"DeletedAtToRPC\""];
  // Name 角色名称
  string name = 5 [
    (tagger.tags) = "validate:\"required\" label:\"角色名称\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "角色名称"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // Typ 角色类型,1平台角色
  int32 typ = 6 [
    (tagger.tags) = "validate:\"required,oneof=1\" label:\"角色类型\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "角色类型"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  //  DataPerm 数据权限 1全部数据权限,2用户所属组织及子组织数据权限,3用户所属组织自身数据权限,4仅用户自身数据权限
  int32 data_perm = 7 [
    (tagger.tags) = "validate:\"required,oneof=1 2 3 4\" label:\"数据权限\"",
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      title: "数据权限"
    },
    (google.api.field_behavior) = REQUIRED
  ];
  // Desc 角色描述
  string desc = 8 [(tagger.tags) = "validate:\"omitempty\" label:\"角色备注\""];
  // ViewMenus 页面菜单,采用,分隔,如13423531,41252354
  string view_menus = 9 [(tagger.tags) = "validate:\"omitempty\" label:\"页面菜单权限\""];
  // Uses 功能权限,采用,分隔.
  string uses = 10 [(tagger.tags) = "validate:\"omitempty\" label:\"功能权限\""];
  // Apis 接口权限列表,接口id列表
  repeated uint64 apis = 11 [(tagger.tags) = "validate:\"omitempty\" label:\"接口权限\""];
  // Policies 接口权限策略列表，由 gateway 聚合服务根据接口字典转换后传递给 user 服务。
  repeated RolePermissionPolicy policies = 12 [(tagger.tags) = "validate:\"omitempty\" label:\"接口权限策略\" copier:\"PoliciesToRPC\""];
}

// RolePermissionPolicy 角色接口权限策略
message RolePermissionPolicy {
  // Service gRPC 完整服务名，例如 user.v1.UserService。
  string service = 1 [(tagger.tags) = "validate:\"omitempty\" label:\"接口服务\""];
  // Method gRPC 方法名，例如 AddUser。
  string method = 2 [(tagger.tags) = "validate:\"omitempty\" label:\"接口方法\""];
}
