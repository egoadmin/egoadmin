services:
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z-cpuv1
    user: root
    privileged: true
    restart: always
    ports:
      - "9000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-egoadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-egoadmin123}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-egoadmin}
    entrypoint:
      - /bin/sh
      - -c
      - |
        (
          until (/usr/bin/mc alias set localminio http://localhost:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}) do
            echo "Waiting for MinIO to be ready..."
            sleep 1
          done
          /usr/bin/mc mb --ignore-existing localminio/$${STORAGE_BUCKET}
          /usr/bin/mc anonymous set download localminio/$${STORAGE_BUCKET}
          echo "MinIO initialization complete."
        ) &
        exec minio server /data --console-address ":9001"
    volumes:
      - ../data/minio:/data
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/mc alias set health_check http://localhost:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} && /usr/bin/mc ready health_check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
