services:
  mysql-idgen:
    image: mysql:8.4.5
    user: root
    privileged: true
    restart: always
    ports:
      - "3308:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: egoadmin
      MYSQL_DATABASE: egoadmin_idgen
      MYSQL_USER: egoadmin
      MYSQL_PASSWORD: egoadmin
    volumes:
      - ../data/idgen/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql-gateway:
    image: mysql:8.4.5
    user: root
    privileged: true
    restart: always
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: egoadmin
      MYSQL_DATABASE: egoadmin_gateway
      MYSQL_USER: egoadmin
      MYSQL_PASSWORD: egoadmin
    volumes:
      - ../data/gateway/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql-user:
    image: mysql:8.4.5
    user: root
    privileged: true
    restart: always
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: egoadmin
      MYSQL_DATABASE: egoadmin_user
      MYSQL_USER: egoadmin
      MYSQL_PASSWORD: egoadmin
    volumes:
      - ../data/user/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
